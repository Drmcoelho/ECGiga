module:
  id: ecg-basics
  title: "ECG Básico — Fundamentos da Eletrocardiografia"
  version: "1.0.0"
  language: pt-BR
  authors:
    - "ECGiga Project"
  disclaimer: >
    Este material é exclusivamente educacional e não substitui
    avaliação clínica profissional. Não tome decisões médicas
    baseado apenas neste conteúdo.

lessons:
  - id: fundamentos
    file: lessons/01-fundamentos.md
    title: "Fundamentos do ECG"
    skills: [ecg_basics, cardiac_anatomy]

  - id: derivacoes
    file: lessons/02-derivacoes.md
    title: "Derivações — 12 olhares sobre o coração"
    skills: [lead_placement, lead_interpretation]
    prerequisites: [fundamentos]

  - id: ritmo-sinusal
    file: lessons/03-ritmo-sinusal.md
    title: "Ritmo Sinusal e Frequência Cardíaca"
    skills: [rhythm_analysis, heart_rate]
    prerequisites: [fundamentos]

  - id: eixo
    file: lessons/04-eixo-eletrico.md
    title: "Eixo Elétrico no Plano Frontal"
    skills: [axis_determination]
    prerequisites: [derivacoes]

  - id: intervalos
    file: lessons/05-intervalos.md
    title: "Intervalos e Segmentos — PR, QRS, QT"
    skills: [interval_analysis, qtc_calculation]
    prerequisites: [ritmo-sinusal]

quizzes:
  - id: fundamentos-quiz
    file: quizzes/fundamentos.json
    linked_lessons: [fundamentos, derivacoes]

cases:
  - id: caso-01-normal
    file: cases/caso-01-normal.json
    title: "ECG Normal — Análise Sistemática"
    linked_lessons: [fundamentos, derivacoes, ritmo-sinusal, eixo, intervalos]
