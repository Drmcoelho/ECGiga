name: Tests

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install httpx

      - name: Lint new/changed modules
        run: |
          ruff check cv/__init__.py cv/trace.py cv/intervals.py cv/intervals_refined.py \
            reporting/export.py mcp_server.py \
            tests/ conftest.py \
            --select E,F --ignore E501,E401,E701,E702,E711,E712,E731,F401,F811

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
