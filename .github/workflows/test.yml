name: Tests

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install httpx pytest-cov

      - name: Lint all modules
        run: |
          ruff check \
            cv/ pathology/ quiz/ education/ simulation/ ai/ \
            datasets/ reporting/ signal_processing/ persistence/ \
            case_player/ validation/ web_app/ mega/ \
            mcp_server.py conftest.py tests/ \
            --select E,F --ignore E501,E401,E402,E701,E702,E711,E712,E731,E741,F401,F811

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
